name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync repo to repo
        uses: Jooho/sync-upstream-repo@1.0.0
        with:
          upstream_repo: https://github.com/sunnytambi/sunny-s-portfolio.git
          upstream_branch: main

          downstream_repo: https://github.com/sunnytambi/portfolio.git
          downstream_branch: master

          token: ${{ secrets.GITHUB_TOKEN }}

          # Optional
          fetch_args: ""
          merge_args: ""
          push_args: ""
          spawn_logs: "true"
          branch_prefix: ""
